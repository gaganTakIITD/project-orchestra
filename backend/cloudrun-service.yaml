apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: orchestra-api
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: gen-lang-client-0795401430:us-central1:orchestra-pg
        run.googleapis.com/vpc-access-connector: projects/gen-lang-client-0795401430/locations/us-central1/connectors/orchestra-vpc
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            # Secrets: Secret Manager (see docs/DEPLOY_API.md). Never commit plaintext.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orchestra-database-url
                  key: latest
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: orchestra-secret-key
                  key: latest
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: orchestra-gemini-api-key
                  key: latest
            - name: CLOUD_SQL_INSTANCE
              value: gen-lang-client-0795401430:us-central1:orchestra-pg
            - name: CLOUD_SQL_IP_TYPE
              value: private
            - name: CORS_ORIGINS
              value: https://project-orchestra-khaki.vercel.app,https://project-orchestra.vercel.app
            - name: AUTH_MODE
              value: demo
            - name: AUTO_SEED
              value: "true"
            - name: AUTO_CREATE_ALL
              value: "false"
            - name: APP_ENV
              value: production
