# Deploy template: raystartup free trial (₹28,219 until 2026-10-12).
# Eligible: Cloud Run, Cloud SQL, Artifact Registry, Vertex AI (first-party Gemini).
# NOT eligible: Gemini Developer API / AI Studio keys — do not bind GEMINI_API_KEY.
# gen-lang-client ₹95.7k = Agent Builder Search/Conversation ONLY.
# See docs/GCP_BILLING_SPLIT.md
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: orchestra-api
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: raystartup:us-central1:orchestra-trial-pg
        run.googleapis.com/vpc-access-connector: projects/raystartup/locations/us-central1/connectors/orchestra-vpc
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            # DB + app secrets only — no GEMINI_API_KEY.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orchestra-database-url
                  key: latest
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: orchestra-secret-key
                  key: latest
            - name: GEMINI_AUTH
              value: vertex
            - name: VERTEX_PROJECT
              value: raystartup
            - name: VERTEX_LOCATION
              value: us-central1
            - name: CLOUD_SQL_INSTANCE
              value: raystartup:us-central1:orchestra-trial-pg
            - name: CLOUD_SQL_IP_TYPE
              value: private
            - name: CORS_ORIGINS
              value: https://project-orchestra-khaki.vercel.app,https://project-orchestra.vercel.app
            - name: AUTH_MODE
              value: demo
            - name: AUTO_SEED
              value: "true"
            - name: AUTO_CREATE_ALL
              value: "false"
            - name: APP_ENV
              value: production
